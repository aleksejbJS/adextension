<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <h3>Adult Ad Detector</h3>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="results">Результаты</button>
      <button class="tab" data-tab="settings">Настройки</button>
    </div>

    <!-- Results tab -->
    <div id="tab-results" class="tab-content active">
      <div class="actions">
        <button id="scanAds">Сканировать</button>
        <button id="clearHighlight">Снять</button>
      </div>

      <div id="density-bar">
        <span>Плотность рекламы:</span>
        <div class="bar"><div class="bar-fill" id="densityFill"></div></div>
        <span id="densityPct">0%</span>
      </div>

      <div id="filters">
        <select id="filterNetwork"><option value="">Все сети</option></select>
        <select id="filterFormat"><option value="">Все форматы</option></select>
      </div>

      <div id="summary">Найдено: 0</div>
      <div id="adsList"></div>

      <div id="extraSection" style="display:none">
        <div class="section-title">Pop-under / VAST</div>
        <div id="extraList"></div>
      </div>
    </div>

    <!-- Settings tab -->
    <div id="tab-settings" class="tab-content">
      <label>Свои домены (по одному на строку):</label>
      <textarea id="customDomains" rows="5" placeholder="example.com&#10;cdn.adnetwork.net"></textarea>
      <button id="saveCustom">Сохранить</button>
      <div id="saveStatus"></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
